name: Web CI

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: debug
  RUST_BACKTRACE: full
  WEB_ARTIFACT_NAME: web-generated
  WEB_ARTIFACT_PATH: web/generated

jobs:
  web-artifacts:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      options: --user 0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: target/
          key: ${{ github.job }}-${{ hashFiles('Cargo.lock') }}

      - name: Build web artifacts (typegen + wasm)
        run: just web-artifacts

      - name: Upload web artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: ${{ env.WEB_ARTIFACT_PATH }}

  quality-check-web:
    runs-on: ubuntu-latest
    needs: web-artifacts
    container:
      image: ${{ inputs.image }}
      options: --user 0
    steps:
      - uses: actions/checkout@v6
      - &node-modules-cache
        uses: actions/cache@v5
        with:
          path: web/node_modules/
          key: ${{ github.job }}-${{ hashFiles('web/package-lock.json') }}

      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: ${{ env.WEB_ARTIFACT_PATH }}

      - name: Check npm formatting
        if: ${{ !cancelled() }}
        run: just web-format-check

      - name: Check for npm lint warnings
        if: ${{ !cancelled() }}
        run: just web-lint-only

  web-build:
    runs-on: ubuntu-latest
    needs: web-artifacts
    container:
      image: ${{ inputs.image }}
      options: --user 0
    steps:
      - uses: actions/checkout@v6
      - *node-modules-cache

      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: ${{ env.WEB_ARTIFACT_PATH }}

      - name: Build web
        run: just web-build-only
