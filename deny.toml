[advisories]
unmaintained = "workspace"
yanked = "deny"
ignore = []

[bans]
multiple-versions = "allow"
wildcards = 'deny'
deny = [
    { crate = "openssl", use-instead = "rustls" },
    { crate = "openssl-sys", use-instead = "rustls" },
    "libssh2-sys",
]

[licenses]
allow = ["Apache-2.0", "MIT", "Unicode-3.0"]
unused-allowed-license = "deny"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
